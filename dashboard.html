<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="stylesheet" href="dashboard.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body id="dashboardBody">
    <div class="container">
        <div class="logoContainer">
            <div class="logo">
                <i class="fa-regular fa-gem"></i>
                <h2>Task Manager</h2>
            </div>
            <div class="searchbar">
                <input type="search" name="search" id="search">
                <i class="fa fa-search"></i>
            </div>
        </div>
        <br/>
        <hr/>
        <div class="mainContainer">
            <div class="sidebar">
                <div class="catagory">
                    <button>DashBoard</button>
                </div>
                <div class="catagory">
                    <button>Projects</button>
                </div>
                <div class="catagory">
                    <button id="logout">logout</button>
                </div>
                
            </div>
            <div class="taskContainer">
                <div class="titlebar">
                    <button class="createTask" id="task">Add Task</button>
                </div>
                <div class="dataContainer">
                    <div class="todo" id="todos">
                        <h3>todo</h3></div>
                    <div class="inProgress" id="inProgress">inprogress</div>
                    <div class="done" id="done">done</div>
                </div>
            </div>
        </div>
        <!--Add Task form here -->
        <div class="formContainer" id="addTask">
            <div class="closeButton" id="close-btn">X</div>
            <form >
                <div class="formFields">
                    <label for="task">Task</label>
                    <input type="text" name="task" id="formTask" />
                </div>
                <!-- <div class="formFields">
                    <label for="newProject">Task</label>
                    <input type="text" name="newProject" id="newProject" />
                </div> -->
                <input type="submit" id="formSubmit" value="Add Task">
            </form>
        </div>
    </div>
    <script type="module" src="dashboard_script.js"></script>
</body>
</html>
